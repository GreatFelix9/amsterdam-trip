<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Amsterdam 🇳🇱 July 2026</title>
<style>
:root {
  --bg: #f4f3f0; --card: #ffffff; --border: #e4e3df; --text: #1a1a18;
  --muted: #888; --blue: #185FA5; --teal: #0F6E56; --teal-bg: #E1F5EE;
  --amber: #854F0B; --amber-bg: #FAEEDA; --nav-h: 64px; --r: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding-bottom:var(--nav-h);min-height:100vh;}
.mode-bar{display:flex;background:#1a1a18;padding:10px 12px 0;gap:6px;}
.mode-btn{flex:1;padding:8px;border:none;border-radius:10px 10px 0 0;font-size:13px;font-weight:700;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);}
.mode-btn.active{background:#fff;color:#1a1a18;}
.screen{display:none;} .screen.active{display:block;}
.screen-header{background:var(--card);padding:1rem;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.screen-body{padding:1rem;}
.todo-item{display:flex;align-items:center;padding:1rem;border-bottom:1px solid var(--border);background:white;}
.status-pill{font-size:11px;padding:4px 8px;border-radius:12px;margin-left:auto;cursor:pointer;}
.status-booked{background:var(--teal-bg);color:var(--teal);}
.status-todo{background:var(--amber-bg);color:var(--amber);}
.edit-ctrl{font-size:10px;color:var(--blue);margin-top:4px;cursor:pointer;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:1.5rem;z-index:999;}
.hidden{display:none;}
.modal-box{background:white;padding:1.5rem;border-radius:var(--r);width:100%;max-width:300px;}
.user-count{font-size:12px;color:var(--muted);text-align:right;padding:5px 1rem;}
</style>
</head>
<body>

<div class="mode-bar">
  <button class="mode-btn active" id="btn-personal" onclick="setMode('personal')">👤 Personal</button>
  <button class="mode-btn" id="btn-shared" onclick="setMode('shared')">👥 Shared</button>
</div>

<div id="user-counter" class="user-count" style="display:none;">👥 Users online: 1</div>

<div class="modal-overlay hidden" id="pw-modal">
  <div class="modal-box">
    <h3>Enter Password</h3>
    <input type="password" id="pw-input" style="width:100%;padding:8px;margin:10px 0;">
    <button onclick="checkPassword()">Unlock</button>
    <button onclick="document.getElementById('pw-modal').classList.add('hidden')">Cancel</button>
  </div>
</div>

<div class="screen active" id="home">
  <div class="screen-header"><h2>Amsterdam 2026</h2></div>
  <div class="screen-body">
    <div id="todo-list"></div>
  </div>
</div>

<script>
let currentMode = 'personal';
let sharedUnlocked = false;

// Sample Activity List
let activities = [
    {id: 1, name: "Walibi Holland", booked: false, time: "14:30", day: "Day 2"},
    {id: 2, name: "Tiki Pool (Duinrell)", booked: true, time: "17:00", day: "Day 3"}
];

function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+mode).classList.add('active');
    
    if(mode === 'shared') {
        document.getElementById('user-counter').style.display = 'block';
    } else {
        document.getElementById('user-counter').style.display = 'none';
    }
    renderTodos();
}

function renderTodos() {
    const list = document.getElementById('todo-list');
    list.innerHTML = activities.map(a => `
        <div class="todo-item">
            <div>
                <strong>${a.name}</strong><br>
                <input type="text" value="${a.time}" onchange="updateActivity(${a.id}, 'time', this.value)"> at ${a.day}
            </div>
            <div class="status-pill ${a.booked ? 'status-booked' : 'status-todo'}" onclick="toggleBooked(${a.id})">
                ${a.booked ? 'Booked ✓' : 'To Do'}
            </div>
        </div>
    `).join('');
}

function toggleBooked(id) {
    const act = activities.find(a => a.id === id);
    act.booked = !act.booked;
    renderTodos();
}

function updateActivity(id, field, val) {
    const act = activities.find(a => a.id === id);
    act[field] = val;
    console.log("Updated", act);
}

// Password Protection for Shared
function navigateToPlan() {
    if(currentMode === 'shared' && !sharedUnlocked) {
        document.getElementById('pw-modal').classList.remove('hidden');
    } else {
        // Navigate to plan...
    }
}

function checkPassword() {
    const val = document.getElementById('pw-input').value;
    if(val === "1234") { // Set your password
        sharedUnlocked = true;
        document.getElementById('pw-modal').classList.add('hidden');
    } else {
        alert("Wrong Password");
    }
}

renderTodos();
</script>
</body>
</html>
