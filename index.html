<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amsterdam Trip App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Screens -->
  <div class="screen active" id="home">
    <h1>🏠 Home</h1>
    <p>Welcome to your Amsterdam Trip App</p>
  </div>

  <div class="screen" id="itinerary">
    <h1>📅 Itinerary</h1>
    <div id="itinerary-content"></div>
  </div>

  <div class="screen" id="food">
    <h1>🍔 Food</h1>
    <p>Restaurants and food plans</p>
  </div>

  <div class="screen" id="info">
    <h1>ℹ️ Info</h1>
    <p>Important trip info</p>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button onclick="showScreen('home')">Home</button>
    <button onclick="showScreen('itinerary')">Itinerary</button>
    <button onclick="showScreen('food')">Food</button>
    <button onclick="showScreen('info')">Info</button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
