<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amsterdam 2026 Planner</title>
<style>
    body { font-family: sans-serif; background: #f4f3f0; padding: 20px; }
    .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; }
    .hidden { display: none; }
    button { padding: 8px 12px; cursor: pointer; }
    .item-list { list-style: none; padding: 0; }
</style>
</head>
<body>

<div id="user-setup">
    <h2>Select Your Account</h2>
    <select id="user-select" onchange="switchUser()">
        <option value="">-- Choose User --</option>
        <option value="Great">Great</option><option value="Lashawn">Lashawn</option>
        <option value="Kethan">Kethan</option><option value="Tabs">Tabs</option>
        <option value="Shadrik">Shadrik</option><option value="Deniz">Deniz</option>
        <option value="Hamilton">Hamilton</option><option value="Andrew">Andrew</option>
    </select>
</div>

<div id="main-app" class="hidden">
    <button onclick="logout()">Logout</button>
    <h3>Logged in as: <span id="user-display"></span></h3>
    
    <div class="card">
        <h4>Budget Tracker</h4>
        Current Budget: £<input type="number" id="budget-input" onchange="syncData()">
    </div>

    <div class="card">
        <h4>Minimum Costs</h4>
        <div id="min-costs"></div>
    </div>

    <div class="card">
        <h4>Add Custom Spots</h4>
        <input type="text" id="new-item-input" placeholder="Food or Club name">
        <button onclick="addCustom()">Add</button>
        <ul id="custom-list" class="item-list"></ul>
    </div>
</div>

<script>
const BIN_ID = '6a45e233f5f4af5e2951855e';
const API_KEY = '$2a$10$tUEGnNwl/Gz8pCUZwa6bfea6YgnnauKC7hGVKRhouNJ/xEgwIRziq';
let currentUser = "";
let masterData = { users: {} };

async function switchUser() {
    currentUser = document.getElementById('user-select').value;
    if(!currentUser) return;
    
    // Fetch latest from JSONBin
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: {'X-Access-Key': API_KEY} });
    const json = await res.json();
    masterData = json.record;

    document.getElementById('user-setup').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    document.getElementById('user-display').innerText = currentUser;
    render();
}

function render() {
    const user = masterData.users[currentUser];
    document.getElementById('budget-input').value = user.budget || 0;
    
    // Render Min Costs
    const minCosts = [{n:"Tiki Pool", p:27.5}, {n:"Walibi", p:23}, {n:"Canal", p:20}];
    document.getElementById('min-costs').innerHTML = minCosts.map(item => `
        <div><input type="checkbox" ${user.removedCosts.includes(item.n)?'':'checked'} 
        onchange="toggleCost('${item.n}')"> ${item.n} (£${item.p})</div>
    `).join('');

    // Render Custom
    document.getElementById('custom-list').innerHTML = user.custom.map((c, idx) => `
        <li>${c} <button onclick="removeCustom(${idx})">x</button></li>
    `).join('');
}

async function syncData() {
    masterData.users[currentUser].budget = document.getElementById('budget-input').value;
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json', 'X-Access-Key': API_KEY},
        body: JSON.stringify(masterData)
    });
}

function toggleCost(name) {
    let user = masterData.users[currentUser];
    if(user.removedCosts.includes(name)) user.removedCosts = user.removedCosts.filter(n => n !== name);
    else user.removedCosts.push(name);
    syncData();
}

function addCustom() {
    const val = document.getElementById('new-item-input').value;
    if(!val) return;
    masterData.users[currentUser].custom.push(val);
    document.getElementById('new-item-input').value = '';
    render();
    syncData();
}

function removeCustom(idx) {
    masterData.users[currentUser].custom.splice(idx, 1);
    render();
    syncData();
}

function logout() { location.reload(); }
</script>
</body>
</html>
